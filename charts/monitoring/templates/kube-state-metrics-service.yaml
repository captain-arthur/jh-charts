{{- if .Values.kubeStateMetrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kube-state-metrics
  labels:
    {{- include "monitoring.labels" (dict "root" . "component" "kube-state-metrics") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    {{- include "monitoring.labels" (dict "root" . "component" "kube-state-metrics") | nindent 4 }}
{{- end }}
