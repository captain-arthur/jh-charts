{{- if .Values.nodeExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-node-exporter
  labels:
    {{- include "monitoring.labels" (dict "root" . "component" "node-exporter") | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9100"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 9100
      targetPort: metrics
      name: metrics
  selector:
    {{- include "monitoring.labels" (dict "root" . "component" "node-exporter") | nindent 4 }}
{{- end }}
