{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus
  labels:
    {{- include "monitoring.labels" (dict "root" . "component" "prometheus") | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [{{ .Release.Namespace }}]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ .Release.Name }}-node-exporter
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
            action: replace
      - job_name: kube-state-metrics
        static_configs:
          - targets: ['{{ .Release.Name }}-kube-state-metrics:8080']
{{- end }}
