{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-prometheus
  labels:
    {{- include "monitoring.labels" (dict "root" . "component" "prometheus") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: http
      name: http
  selector:
    {{- include "monitoring.labels" (dict "root" . "component" "prometheus") | nindent 4 }}
{{- end }}
